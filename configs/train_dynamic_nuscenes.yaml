data:
  image_dir: data/datasets/nuscenes/processed_10Hz/trainval2
  train_scene_list: data/datasets/nuscenes/processed_10Hz/trainval2/nuScenes_Train.txt
  val_scene_list: data/datasets/nuscenes/processed_10Hz/trainval2/nuScenes_Val.txt
  sequence_length: 3
  num_cameras_per_frame: 3
  target_size: 448
  max_interval: 5

model_init:
  aggregator_ckpt: checkpoints/recondrive/merged_ckpts/aggregator_merged.ckpt
  dynamic_head_ckpt: checkpoints/DGGT_splitPtWeights/instance_head.pt
  aggregator_prefix: aggregator.
  dynamic_head_prefix: instance_head.
  aggregator_to_bfloat16: false

train:
  max_epoch: 5
  # progress_steps_per_epoch: 68925
  batch_size: 2
  num_workers: 16
  val_num_workers: 2
  # Legacy epoch-based keys (still supported as fallback):
  val_every: 1 # not used
  save_ckpt_every: 100 # not used
  # Preferred global-step keys:
  val_every_steps: 1000
  save_ckpt_every_steps: 20000
  val_at_start: true

  lr: 4.0e-5
  weight_decay: 1.0e-4
  warmup_iterations: 1000

  trainable_modules:
    - dynamic_head

  lr_per_module:
    dynamic_head: 4.0e-5

  use_amp: true
  amp_dtype: bfloat16

loss:
  dynamic_weight: 1.0

log:
  log_dir: logs/dynamic_head_nuscenes
  tensorboard_subdir: tensorboard
  # Legacy key (fallback):
  debug_vis_every: 10 # not used
  # Preferred global-step key:
  vis_flag: true
  debug_vis_every_steps: 4000

